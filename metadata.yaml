abstract: |-
  A provocative thesis reads the present authoritarian and plutocratic turn as an anticipatory counterrevolution, a reaction by the powerful against a near future in which AI, open-source investigation, automated translation, and computational audit make impunity impossible to maintain. The strong form does not survive: the movements predate the technology and are already explained by status threat, nationalism, elite economic interest, and institutional weakness. But a narrow mechanism does survive, and this paper prices it. Whether a wrongful act meets a consequence is the product of a chain of stage probabilities, discovery, attribution, publication, prosecution, independent judgment, and enforcement, and a product is bounded by its weakest term. Generative AI raises the first three, the evidence stages, toward one; it does not raise the last three, the institutional stages, which are human and capturable. Solved over a population of cases, the model yields three results. The bottleneck moves: before AI the binding stage is discovery and the probability of consequence sits at 0.078 of what the institutions would allow, while after AI it sits at the institutional ceiling exactly, so further evidence buys nothing and the binding constraint becomes adjudication. Impunity is conserved: cheaper evidence would multiply the probability of consequence nearly thirteenfold, from 0.010 to 0.123, but a self-protective elite rationally captures the new bottleneck, prosecution and judgment, and that capture absorbs the entire evidence gain, returning consequence to 0.007, marginally below where it began. And exposure decouples from consequence: the share of wrongdoing that becomes publicly legible rises toward one while the share that is sanctioned does not, so the gap between what is known and what is answered widens roughly fifteenfold, which is the pattern of a leak that reveals everything and a trial that acquits everyone. The same chain run downward, the state's automated case against a subject, inverts: AI raises the accusation stage and capture removes the protections, so a captured system harms the weak about sixfold. The age AI inaugurates is therefore not the last age of impunity but the age of impunity made visible, and what to do about visible impunity is a question about courts and enforcement, not about models. The construct prices an incentive structure; it does not measure any country, and it is explicit that the motives of real movements are multicausal and largely older than the machine. Ships a runnable simulation whose output carries every modelled number.
